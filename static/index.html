<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot - India Higher Education Counselor</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar or Header -->
        <header class="header glassmorphism">
            <div class="logo">
                <div class="icon-gradient">🎓</div>
                <h1>EduBot India</h1>
            </div>
            <p class="subtitle">Your AI-Powered Higher Education Counselor</p>
        </header>

        <!-- Chat Area -->
        <main class="chat-container glassmorphism">
            <div class="chat-messages" id="chat-messages">
                <!-- Messages will be injected here -->
                <div class="message bot-message">
                    <div class="message-content">
                        Namaste! I am EduBot. Ask me about minimum percentage requirements, cutoffs, or admission procedures for any colleges and universities in India.
                    </div>
                </div>
            </div>

            <!-- Typing Indicator (hidden by default) -->
            <div class="typing-indicator" id="typing-indicator" style="display: none;">
                <span></span><span></span><span></span>
            </div>

            <form class="input-area" id="chat-form">
                <input type="text" id="user-input" placeholder="E.g., What is the cutoff for IIT Bombay computer science?" autocomplete="off" required>
                <button type="submit" id="send-btn" aria-label="Send Message">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </main>
    </div>
    
    <!-- Render markdown to HTML for better display -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
